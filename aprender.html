<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Aprender a brincar — explicações lúdicas e visuais da matéria difícil, passo a passo, para quem não percebe.">
<meta name="theme-color" content="#56b6c2">
<title>Aprender · 3ponto14</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
</head>
<body>

<!-- Topbar unificada -->
<nav class="site-topbar">
  <a href="index.html" class="site-topbar-logo">
    <img class="mark" src="icons/logo-3ponto14.png" alt="3ponto14">
    <span class="wordmark">3ponto<em>14</em></span>
  </a>
  <div class="site-topbar-sep"></div>
  <span class="site-topbar-title">Aprender</span>
  <div class="site-topbar-actions"></div>
  <button class="site-topbar-back" onclick="location.href='index.html'"><i class="ph ph-arrow-left"></i> Início</button>
</nav>

<main class="apr-page">

  <!-- Hero -->
  <section class="apr-hero">
    <span class="apr-hero-badge"><i class="ph ph-sparkle"></i> Aprender a brincar</span>
    <h1 class="apr-hero-title">Não percebes a matéria?<br>Deixa-me explicar-te.</h1>
    <p class="apr-hero-sub">Explicações <b>passo a passo</b> e <b>visuais</b> — mexe, vê o que acontece, e percebe de verdade. Como ter o manual ao teu lado, mas a brincar.</p>
  </section>

  <!-- Catálogo de temas (ou o explicador aberto) -->
  <div id="aprender-host"></div>
  <div id="aprender-cat"></div>

</main>

<script src="js/shared.js"></script>
<script src="js/visuals.js"></script>
<script src="js/aprender.js"></script>
<script src="js/aprender-temas.js"></script>
<script src="js/aprender-temas-mat7.js"></script>
<script>
  // Quando se abre um tema, o host enche-se e o catálogo esconde-se.
  (function () {
    var cat = document.getElementById('aprender-cat');
    var host = document.getElementById('aprender-host');
    APRENDER.catalogo('aprender-cat');
    // intercepta abrir para alternar catálogo/explicador
    var _abrir = APRENDER.abrir;
    APRENDER.abrir = function (id) {
      cat.style.display = 'none';
      host.style.display = 'block';
      _abrir(id, 'aprender-host');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    // botão "voltar ao catálogo" — injeta-se no topo do host quando há tema aberto
    host.style.display = 'none';
    window.aprenderVoltarCatalogo = function () {
      host.style.display = 'none'; host.innerHTML = '';
      cat.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
  })();
</script>
</body>
</html>
