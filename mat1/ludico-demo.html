<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Lúdica · Matemática 1.º ano · 3ponto14</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:linear-gradient(160deg,#fef6e7,#eaf5ff);font-family:'Montserrat',sans-serif;min-height:100vh;padding:1.5rem}
  .demo-wrap{max-width:560px;margin:0 auto}
  .demo-head{text-align:center;margin-bottom:1rem}
  .demo-head h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:#4a3f7a;margin:.2rem 0}
  .demo-head p{color:#7a7068;font-size:.9rem;margin:0}
  .demo-card{background:#fff;border-radius:24px;padding:1.4rem;box-shadow:0 10px 40px rgba(0,0,0,.1)}
  .demo-back{display:inline-block;margin-bottom:1rem;color:#4a3f7a;font-weight:700;text-decoration:none;font-size:.9rem}
</style>
</head>
<body>
<div class="demo-wrap">
  <a class="demo-back" href="index.html">← Voltar</a>
  <div class="demo-head">
    <div style="font-size:2.6rem">🦊</div>
    <h1>Vamos brincar com os números!</h1>
    <p>Matemática · 1.º ano · demonstração lúdica</p>
  </div>
  <div class="demo-card">
    <div id="ludico-host"></div>
  </div>
</div>

<script src="../js/ludico.js"></script>
<script>
  // Sequência de exemplo: contar e somar com imagens
  LUDICO.jogar('ludico-host', [
    { tipo:'contar', emoji:'🍎', total:3, nome:'maçãs',    pergunta:'Quantas maçãs vês?' },
    { tipo:'somar',  emoji:'🐟', a:3, b:2,                  pergunta:'Junta todos os peixes na rede!' },
    { tipo:'contar', emoji:'🌸', total:6, nome:'flores',    pergunta:'Conta as flores do jardim!' },
    { tipo:'somar',  emoji:'🎈', a:4, b:3,                  pergunta:'Quantos balões há ao todo?' },
    { tipo:'contar', emoji:'🐝', total:5, nome:'abelhas',   pergunta:'Quantas abelhas estão a voar?' }
  ]);
</script>
</body>
</html>
